version: 2

models:
  - name: raw_superstore
    description: "Bronze layer — raw Superstore data, no transformation"
    columns:
      - name: row_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
